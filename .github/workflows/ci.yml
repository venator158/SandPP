name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: pathsandbox:latest

      - name: Run container scenario
        run: |
          mkdir -p examples/out || true
          docker run --rm -v ${{ github.workspace }}/examples:/data pathsandbox:latest --input /data/grid1.json --planner dijkstra --output /data/out

      - name: Verify outputs
        run: |
          if [ ! -f examples/out/metrics.json ]; then echo "metrics.json not found" && ls -la examples/out && exit 1; fi
